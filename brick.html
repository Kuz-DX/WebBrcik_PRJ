<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>벽돌깨기 게임</title>
    <link rel="stylesheet" href="brick.css">
</head>
<body>
    
    <div id="gameContainer">
        <div id="mainScreen" class="screen-overlay">
        <div class="title-container">
            <h1 class="game-title">5월의 어느날</h1>
            <p class="game-subtitle">집에 가고 싶어요</p>
        </div>
        <div class="menu-container-br">
            <button id="startNewGameBtn" class="menu-btn">시작</button>
            <button id="difficultyBtn" class="menu-btn">난이도</button>
            <button id="optionBtn" class="menu-btn">옵션</button>
        </div>
        </div> 
        <div id="stageSelectModal" class="modal-overlay">
            <div class="modal-content select-modal">
            <h2>스테이지 선택</h2>
            <div class="stage-list">
                <button class="stage-item-btn" value="0">Stage 1: 튜토리얼</button>
                <button class="stage-item-btn" value="1">Stage 2: 이산수학 </button>
                <button class="stage-item-btn" value="2">Stage 3: 객체지향프로그래밍</button>
                <button class="stage-item-btn" value="4">Stage 4: 자료구조</button>
                <button class="stage-item-btn" value="5">Stage 5: 웹프로그래밍</button>
            </div>
                <button id="closeStageBtn" class="close-btn">닫기</button>
            </div>
        </div>
    <div id="difficultyModal" class="modal-overlay">
        <div class="modal-content difficulty-modal">
            <h2>난이도 선택</h2>
            <div class="difficulty-list">
                <button class="diff-item-btn active" id="easyBtn">Easy</button>
                <button class="diff-item-btn" id="normalBtn">Normal</button>
                <button class="diff-item-btn" id="gosuBtn">Go-su</button>
                <button class="diff-item-btn" id="goatBtn">G.O.A.T</button>
            </div>
            <button id="closeDifficultyBtn" class="close-btn">닫기</button>
        </div>
    </div>

        <canvas id="gameCanvas"></canvas>
        <!-- 대화창 (필요할 때만 노출) -->
        <div id="quest-box" class="dialogue-box">
            <div id="speaker" class="speaker-name">sampleText</div>
            <div class="dialogue-content">
                <p id="dialogue">sampleText</p>
            </div>
            <div class="next-cursor" id="next-cursor">▼</div>
        </div>
        <div id="gameOverScreen">
            <h2 id="gameOverMessage">게임 오버!</h2>
            <div class="divBtn">
                <button class="restartBtn">다시 시작</button>
                <button class="mainBtn">메인으로</button>
            </div>
        </div>
        <div id="gameClearScreen">
            <h2 id="gameClearMessage">스테이지 클리어!</h2>
            <div class="divBtn">
                <button class="restartBtn">다시 시작</button>
                <button class="mainBtn">메인으로</button>
                <button id="nextBtn">다음 단계</button>
            </div>
        </div>
    </div>

    <script src="brick.js"></script>
</body>
</html>
