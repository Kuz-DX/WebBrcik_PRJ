<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>벽돌깨기 게임</title>
    <link rel="stylesheet" href="brick.css">
</head>
<body>

<div id="stageSelectModal" class="modal-overlay" style="display: none;">
    <div class="modal-content select-modal">
      <h2>스테이지 선택</h2>
      <div class="stage-list">
        <button class="stage-item-btn" value="0">Stage 1: 튜토리얼</button>
        <button class="stage-item-btn" value="1">Stage 2: 이산수학 </button>
        <button class="stage-item-btn" value="2">Stage 3: 객체지향프로그래밍</button>
        <button class="stage-item-btn" value="4">Stage 4: 자료구조</button>
        <button class="stage-item-btn" value="5">Stage 5: 웹프로그래밍</button>
      </div>
      <button id="closeStageBtn" class="close-btn">닫기</button>
    </div>
</div>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        <!-- 대화창 (필요할 때만 노출) -->
        <div id="quest-box" class="dialogue-box">
            <div id="speaker" class="speaker-name">sampleText</div>
            <div class="dialogue-content">
                <p id="dialogue">sampleText</p>
            </div>
            <div class="next-cursor" id="next-cursor">▼</div>
        </div>
        <div id="gameOverScreen">
            <h2 id="gameOverMessage">게임 오버!</h2>
            <button id="restartBtn">다시 시작</button>
        </div>
    </div>

    <script src="brick.js"></script>
</body>
</html>
